<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>究极绿宝石小智版 宝可梦攻略站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif; }

        /* 这里改成墨绿色 #003300，文字白色，保证看清 */
        body {
            background-color: #003300; /* 墨绿色 */
            color: #fff; /* 白色字 */
        }

        .page { display: none; padding: 20px; min-height: 100vh; }
        .page.show { display: block; }

        .home {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            padding: 16px 40px;
            font-size: 20px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .back-btn {
            padding: 8px 20px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: #f0f9f4;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #2d6a4f;
            color: #333; /* 卡片内文字深色 */
        }

        .card img {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 8px;
            padding: 4px;
            object-fit: contain;
        }

        .detail-box {
            max-width: 800px;
            margin: 0 auto;
            background: #f0f9f4;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #2d6a4f;
            color: #333;
        }

        .detail-top {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .detail-img {
            width: 200px;
            height: 200px;
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            object-fit: contain;
        }

        .info { margin: 8px 0; font-size: 15px; }
        .info strong { color: #2d6a4f; }
    </style>
</head>
<body>
<audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop>

<!-- 首页 -->
<div id="page1" class="page show">
    <div class="home">
        <h1>究极绿宝石小智版 宝可梦攻略站</h1>
        <button class="btn" onclick="go(2)">进入攻略</button>
    </div>
</div>

<!-- 列表页 -->
<div id="page2" class="page">
    <button class="back-btn" onclick="go(1)">返回首页</button>
    <h2 style="text-align:center; margin-bottom:20px; color:#f0f9f4;">综合强度 TOP30</h2>
    <div class="grid" id="list"></div>
</div>

<!-- 详情页 -->
<div id="page3" class="page">
    <button class="back-btn" onclick="go(2)">返回列表</button>
    <div class="detail-box">
        <div class="detail-top">
            <img class="detail-img" id="dimg">
            <div>
                <h2 id="dname" style="color:#2d6a4f; margin-bottom:15px;"></h2>
                <div class="info"><strong>性格：</strong><span id="dnature"></span></div>
                <div class="info"><strong>特性：</strong><span id="dability"></span></div>
                <div class="info"><strong>技能：</strong><span id="dskill"></span></div>
                <div class="info"><strong>道具：</strong><span id="ditem"></span></div>
                <div class="info"><strong>玩法：</strong><span id="dplay"></span></div>
            </div>
        </div>
    </div>
</div>

function go(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
    document.getElementById('page'+n).classList.add('show');
}

function loadList() {
    let html = '';
    data.forEach((p, i) => {
        html += `
        <div class="card" onclick="openDetail(${i})">
            <div style="color:#2d6a4f;">TOP${p.rank}</div>
            <img src="${p.img}" alt="${p.name}">
            <div>${p.name}</div>
        </div>`;
    });
    document.getElementById('list').innerHTML = html;
}

function openDetail(i) {
    const d = data[i];
    document.getElementById('dimg').src = d.img;
    document.getElementById('dname').innerText = d.name;
    document.getElementById('dnature').innerText = d.nature;
    document.getElementById('dability').innerText = d.ability;
    document.getElementById('dskill').innerText = d.skill;
    document.getElementById('ditem').innerText = d.item;
    document.getElementById('dplay').innerText = d.play;
    go(3);
}

document.addEventListener('click', function playBGM() {
    document.getElementById('bgm').play().catch(e => {});
    document.removeEventListener('click', playBGM);
});

window.onload = function() {
    loadList();
}
</script>

</html>
