<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>究极绿宝石小智版 宝可梦攻略站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif; }
        body {
            background-color: #003300; /* 墨绿色背景 */
            color: #fff;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin: 40px 0;
            color: #98d8aa;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: #f0f9f4;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            color: #333;
            border: 1px solid #2d6a4f;
        }
        .card img {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 8px;
            padding: 4px;
            object-fit: contain;
        }
        .card .rank {
            color: #2d6a4f;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>究极绿宝石小智版 宝可梦攻略站</h1>

    <div class="grid">
        <div class="card">
            <div class="rank">TOP1</div>
            <img src="https://s.4kdongman.com/files/2022-03-24/1648108081302438.png" alt="烈空坐">
            <div>烈空坐</div>
        </div>
        <div class="card">
            <div class="rank">TOP2</div>
            <img src="https://s.4kdongman.com/files/2022-03-24/1648108100193399.png" alt="超梦">
            <div>超梦</div>
        </div>
        <div class="card">
            <div class="rank">TOP3</div>
            <img src="https://s.4kdongman.com/files/2022-03-24/1648108117302700.png" alt="盖欧卡">
            <div>盖欧卡</div>
        </div>
        <div class="card">
            <div class="rank">TOP4</div>
            <img src="https://s.4kdongman.com/files/2022-03-24/1648108136194301.png" alt="固拉多">
            <div>固拉多</div>
        </div>
        <div class="card">
            <div class="rank">TOP5</div>
            <img src="https://s.4kdongman.com/files/2022-03-24/1648108154303102.png" alt="烈咬陆鲨">
            <div>烈咬陆鲨</div>
        </div>
    </div>

    <audio src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop controls style="display: block; margin: 40px auto; width: 300px;">
</body>
</html>
