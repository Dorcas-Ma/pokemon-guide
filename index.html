<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * {

            padding: 0;
            box-sizing: border-box;

        }

        body {
            background: #000;
            color: #fff;
            padding: 20px;
            background-attachment: fixed;
        }

        .top-bar {
            position: relative;
            max-width: 1500px;
            margin: 0 auto 50px;
        }
        .home-title {
            text-align: center;
            font-size: 36px;
            color: #00ff9d;
            margin: 40px 0;
            text-shadow: 0 0 18px #00ff9d99;
            letter-spacing: 2px;
        }
        .search-box {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 260px;
            height: 42px;
            background: #151515;
            border: 1px solid #333;
            border-radius: 21px;
            padding: 0 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: #00ff9d;
            box-shadow: 0 0 12px #00ff9d55;
        }

        .page {
            display: none;
            animation: fadeInBig 0.6s ease-out;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeInBig {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 12px #00000088;
        }
        .card:hover {
            transform: translateY(-10px) scale(1.04);
            border-color: #00ff9d;
            box-shadow: 0 0 35px #00ff9d66, 0 0 15px #00ff9d44 inset;
            background: #151515;
        }
        .card img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 12px;
            transition: transform 0.3s;
        }
        .card:hover img {
            transform: rotate(3deg) scale(1.05);
        }
        .card .rank {
            color: #00ff9d;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 6px;
        }
        .card div {
            color: #eee;
            font-size: 15px;
        }

        .detail-page {
            max-width: 1000px;
            margin: 0 auto;
            background: #111;
            border-radius: 20px;
            padding: 50px;
            border: 1px solid #222;
            box-shadow: 0 0 40px #000000aa;
        }

        .back-btn {
            padding: 12px 26px;
            background: #00ff9d;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #00e68c;
            transform: scale(1.05);
            box-shadow: 0 0 12px #00ff9d77;
        }

        .detail-header {
            text-align: center;
            margin-bottom: 40px;
        }

            width: 200px;
            height: 200px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 15px;
            object-fit: contain;
            margin-bottom: 20px;
            border: 1px solid #333;
            transition: all 0.3s;
        }

            box-shadow: 0 0 25px #00ff9d55;
        }
        .detail-header h2 {
            font-size: 36px;
            color: #00ff9d;
            text-shadow: 0 0 15px #00ff9d77;
        }

        .habit-box {
            background: #151515;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 35px;
            border: 1px solid #222;
            transition: box-shadow 0.3s;
        }
        .habit-box:hover {
            box-shadow: 0 0 20px #00ff9d33;
        }
        .habit-box h3 {
            color: #00ff9d;
            font-size: 22px;
            margin-bottom: 15px;
        }
        .habit-box p {
            font-size: 17px;
            line-height: 1.9;
            color: #ddd;
        }

            background: #151515;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 35px;
            border: 1px solid #222;
            transition: box-shadow 0.3s;

            box-shadow: 0 0 20px #00ff9d33;
        }

            margin: 18px 0;
            font-size: 17px;
            line-height: 1.8;
        }
        .info-item strong {
            color: #00ff9d;
            width: 110px;
            display: inline-block;
            font-weight: 600;
        }

            border-top: 1px solid #222;
            padding-top: 35px;
        }
        .comment-section h3 {
            color: #00ff9d;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .comment-input {
            width: 100%;
            height: 110px;
            background: #151515;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 16px;
            color: #fff;
            font-size: 16px;
            resize: none;
            margin-bottom: 14px;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .comment-input:focus {
            outline: none;
            border-color: #00ff9d;
            box-shadow: 0 0 15px #00ff9d44;
        }
        .submit-btn {
            padding: 12px 26px;
            background: #00ff9d;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;

        }

            background: #00e68c;
            transform: scale(1.05);
            box-shadow: 0 0 12px #00ff9d77;
        }

            margin-top: 25px;
        }
        .comment-item {
            background: #151515;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;

            line-height: 1.7;
            color: #eee;
            transition: transform 0.2s;
        }
        .comment-item:hover {
            transform: translateX(4px);
        }
    </style>
</head>

        </div>
    </div>
</div>

let currentIndex = 0;
const cardGrid = document.getElementById('cardGrid');
const searchInput = document.getElementById('searchInput');

// ---------- 评论持久化：localStorage ----------
let commentsData = JSON.parse(localStorage.getItem('pokemonComments')) || {};
// 保存评论到本地
function saveComments() {
    localStorage.setItem('pokemonComments', JSON.stringify(commentsData));
}
// 渲染当前宝可梦的评论
function renderComments() {
    const list = document.getElementById('commentList');
    list.innerHTML = '';
    const name = pokemonData[currentIndex].name;
    const arr = commentsData[name] || [];
    arr.forEach(text => {
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.innerText = text;
        list.appendChild(item);
    });
}
// 发表评论
function addComment() {
    const t = document.getElementById('commentInput').value.trim();
    if (!t) return;
    const name = pokemonData[currentIndex].name;
    if (!commentsData[name]) commentsData[name] = [];
    commentsData[name].push(t);
    saveComments();
    renderComments();
    document.getElementById('commentInput').value = '';
}

// ---------- 卡片渲染：显示真实排名、绑定原数组索引 ----------
function renderCards(list) {
    cardGrid.innerHTML = '';
    list.forEach(item => {
        // 找到该宝可梦在原数组里的真实索引（决定排名）
        const realIndex = pokemonData.findIndex(p => p.name === item.name);
        const card = document.createElement('div');
        card.className = 'card';
        // 点击时传递真实索引，内容永远对应
        card.onclick = () => goToDetail(realIndex);
        card.innerHTML = `
            <div class="rank">TOP${realIndex + 1}</div>
            <img src="${item.img}" alt="${item.name}">
            <div>${item.name}</div>
        `;
        cardGrid.appendChild(card);
    });
}

// 初始化渲染全部卡片
renderCards(pokemonData);

// ---------- 搜索：只过滤显示，不打乱原索引 ----------
searchInput.addEventListener('input', function(){
    const key = this.value.trim().toLowerCase();
    if(!key){
        renderCards(pokemonData);
        return;
    }
    const filterList = pokemonData.filter(item => item.name.includes(key));
    renderCards(filterList);
});

// ---------- 详情页：用真实索引取数据 ----------
function goToDetail(index) {
    currentIndex = index;
    const d = pokemonData[index];
    document.getElementById('detailImg').src = d.img;
    document.getElementById('detailName').innerText = d.name;
    document.getElementById('detailHabit').innerText = d.habit;
    document.getElementById('detailNature').innerText = d.nature;
    document.getElementById('detailAbility').innerText = d.ability;
    document.getElementById('detailMoves').innerText = d.moves;
    document.getElementById('detailItem').innerText = d.item;
    document.getElementById('detailPlay').innerText = d.play;

    renderComments(); // 加载该宝可梦的评论

    document.getElementById('homePage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
}

// 返回列表
function goBack() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('homePage').classList.add('active');
}

// 背景音乐
document.addEventListener('click', function play() {
    document.getElementById('bgm').play().catch(()=>{});
    document.removeEventListener('click', play);
});
</script>
