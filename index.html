let currentIndex = 0;
const cardGrid = document.getElementById('cardGrid');
const searchInput = document.getElementById('searchInput');

// 评论持久化：localStorage（按宝可梦名称存储，永久保存）
let commentsData = JSON.parse(localStorage.getItem('pokemonComments')) || {};
function saveComments() { localStorage.setItem('pokemonComments', JSON.stringify(commentsData)); }
function renderComments() {
    const list = document.getElementById('commentList');
    list.innerHTML = '';
    const name = pokemonData[currentIndex].name;
    const arr = commentsData[name] || [];
    arr.forEach(text => {
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.innerText = text;
        list.appendChild(item);
    });
}
function addComment() {
    const t = document.getElementById('commentInput').value.trim();
    if (!t) return;
    const name = pokemonData[currentIndex].name;
    if (!commentsData[name]) commentsData[name] = [];
    commentsData[name].push(t);
    saveComments();
    renderComments();
    document.getElementById('commentInput').value = '';
}

// 卡片渲染：显示真实排名（原数组索引），绑定真实索引
function renderCards(list) {
    cardGrid.innerHTML = '';
    list.forEach(item => {
        const realIndex = pokemonData.findIndex(p => p.name === item.name);
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => goToDetail(realIndex);
        card.innerHTML = `
            <div class="rank">TOP${realIndex + 1}</div>
            <img src="${item.img}" alt="${item.name}">
            <div>${item.name}</div>
        `;
        cardGrid.appendChild(card);
    });
}

// 初始化渲染全部100只
renderCards(pokemonData);

// 搜索：过滤显示，不打乱原排名
searchInput.addEventListener('input', function(){
    const key = this.value.trim().toLowerCase();
    if(!key){
        renderCards(pokemonData);
        return;
    }
    const filterList = pokemonData.filter(item => item.name.includes(key));
    renderCards(filterList);
});

// 详情页：用真实索引取数据，内容永不串位
function goToDetail(index) {
    currentIndex = index;
    const d = pokemonData[index];
    document.getElementById('detailImg').src = d.img;
    document.getElementById('detailName').innerText = d.name;
    document.getElementById('detailHabit').innerText = d.habit;
    document.getElementById('detailNature').innerText = d.nature;
    document.getElementById('detailAbility').innerText = d.ability;
    document.getElementById('detailMoves').innerText = d.moves;
    document.getElementById('detailItem').innerText = d.item;
    document.getElementById('detailPlay').innerText = d.play;
    renderComments();
    document.getElementById('homePage').classList.remove('active');
    document.getElementById('detailPage').classList.add('active');
}

// 返回列表
function goBack() {
    document.getElementById('detailPage').classList.remove('active');
    document.getElementById('homePage').classList.add('active');
}

// 背景音乐：平淡舒缓，点击播放
document.addEventListener('click', function play() {
    document.getElementById('bgm').play().catch(()=>{});
    document.removeEventListener('click', play);
});
